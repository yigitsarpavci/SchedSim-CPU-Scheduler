name: Compile LaTeX Report
on: [push]
permissions:
  contents: write

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: report.tex
          latexmk_use_lualatex: false
          extra_system_packages: "texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-pictures texlive-science texlive-luatex ghostscript"

      - name: Commit and push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add report.pdf
          git commit -m "Auto-compile LaTeX report with new diagram" || echo "No changes to commit"
          git push
